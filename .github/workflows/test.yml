name: Tests

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:

  syntax-check:
    name: Python syntax
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.14"
      - name: py_compile all sources
        run: |
          find custom_components/ tests/ -name "*.py" -exec python -m py_compile {} +
          echo "All Python files syntactically valid."

  lint:
    name: Ruff (lint + format)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.14"
      - name: Install ruff
        run: pip install --quiet ruff
      - name: ruff check
        run: ruff check custom_components/ tests/
      - name: ruff format --check
        run: ruff format --check custom_components/ tests/

  pytest:
    name: pytest (HA via pytest-homeassistant-custom-component)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.14"
      - name: Install test dependencies
        run: |
          pip install --upgrade pip
          # --no-cache-dir guards against stale wheels from the runner image
          # picking up an older pytest-homeassistant-custom-component that
          # pins a pre-2026.5 Home Assistant without radio_frequency.
          pip install --no-cache-dir -r requirements_test.txt
          echo "=== resolved versions ==="
          pip show pytest-homeassistant-custom-component homeassistant rf-protocols | grep -E '^(Name|Version):'
      - name: Run pytest with coverage
        run: |
          PYTHONPATH=. python -m pytest tests/ \
            --cov=custom_components.vacmaster_cardio54 \
            --cov-report=term-missing \
            --cov-report=xml \
            --cov-fail-under=90 \
            --strict-markers \
            -v
      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.xml
          retention-days: 14
